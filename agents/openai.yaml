interface:
  display_name: "Literature Survey Writer"
  short_description: "Zotero-to-manuscript survey loop"
  brand_color: "#2563EB"
  default_prompt: "Use $literature-survey-writer with my literature-search workflow and Zotero MCP to screen, read, write, review, adapt to a target journal, and QA a survey manuscript."

dependencies:
  tools:
    - type: "mcp"
      value: "zotero"
      description: "Use Zotero MCP for local corpus search, metadata/full-text inspection, annotations, tags, duplicate checks, and optional DOI/URL imports when write mode is enabled."

policy:
  allow_implicit_invocation: true
