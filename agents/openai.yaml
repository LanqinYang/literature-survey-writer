interface:
  display_name: "Literature Review + Zotero MCP"
  short_description: "Literature review workflow linked to Zotero MCP"
  brand_color: "#2563EB"
  default_prompt: "Use $literature-survey-writer to start from my keywords, find papers, import them with Zotero MCP, read selected full texts, write the review, run Web GPT review, adapt to a target journal, and QA the manuscript."

dependencies:
  tools:
    - type: "mcp"
      value: "zotero"
      description: "Use Zotero MCP for local corpus search, metadata/full-text inspection, annotations, tags, duplicate checks, and optional DOI/URL imports when write mode is enabled."

policy:
  allow_implicit_invocation: true
